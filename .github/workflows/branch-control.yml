name: Branch Compliance Control

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches: [main, QA]

jobs:
  check-branch-compliance:
    name: Validar origen del Pull Request
    runs-on: ubuntu-latest

    steps:
      - name: Verificar rama de origen permitida
        id: check
        run: |
          SOURCE="${{ github.head_ref }}"
          TARGET="${{ github.base_ref }}"

          echo "=========================================="
          echo "  🔍 Branch Compliance Check"
          echo "=========================================="
          echo "  Rama origen:  $SOURCE"
          echo "  Rama destino: $TARGET"
          echo "=========================================="

          # Guardamos las variables para el siguiente step si es necesario
          echo "source=$SOURCE" >> $GITHUB_OUTPUT
          echo "target=$TARGET" >> $GITHUB_OUTPUT

          if [ "$TARGET" == "main" ]; then
            if [ "$SOURCE" != "QA" ]; then
              echo "error_msg=❌ ERROR: Pull Request rechazado. La rama 'main' solo acepta PRs desde 'QA'. Rama de origen detectada: '$SOURCE'. Flujo correcto: any -> QA -> main" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi

          echo ""
          echo "✅ Validación exitosa: $SOURCE → $TARGET es un flujo permitido."
          echo ""

      - name: Dejar comentario si falla
        if: failure() && steps.check.outputs.error_msg != ''
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${{ steps.check.outputs.error_msg }}`
            })
