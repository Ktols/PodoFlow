name: Deploy Production to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: rm -rf node_modules package-lock.json && npm install

      - name: Code Healthcheck (Validación de Types y Compilación)
        run: npm run build

      - name: Install Vercel CLI
        if: github.event_name == 'push'
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        if: github.event_name == 'push'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        if: github.event_name == 'push'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        if: github.event_name == 'push'
        id: vercel_action
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "url<<$EOF" >> $GITHUB_OUTPUT
          echo "$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Dejar comentario de Despliegue
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        env:
          VERCEL_URL: ${{ steps.vercel_action.outputs.url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const url = process.env.VERCEL_URL;
            
            // Buscar si este commit provino de un Pull Request
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha
            });
            
            const commentBody = `🚀 **Despliegue de PRODUCCIÓN finalizado con éxito**\n🔗 **URL:** ${url}`;
            
            if (prs.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prs.data[0].number,
                body: commentBody
              });
            } else {
              await github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
                body: commentBody
              });
            }
